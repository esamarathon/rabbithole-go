version: '3.8'
services:
  app:
    image: ghcr.io/esamarathon/rabbithole:latest
    build: .
    volumes:
      - ./appsettings.json:/app/appsettings.json:ro
    depends_on:
      - db

  db:
    image: postgres:12
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=rabbithole
